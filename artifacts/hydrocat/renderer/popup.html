<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Please Drink Water</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="window">
    <button class="close-btn" id="closeBtn" title="Close">×</button>

    <div class="cat-stage">
      <img id="catSprite" width="128" height="128" alt="HydroCat" />
      <div class="confetti-container" id="confettiContainer"></div>
    </div>

    <div class="message-area">
      <p class="cat-name">meowdration is back</p>
      <p class="message" id="message">it's itme to sip some water</p>
    </div>

    <div class="streak-area">
      <div class="streak-badge">
        <span class="streak-icon">🏆</span>
        <span class="streak-count" id="streakCount">0</span>
        <span class="streak-label">sip points earned today</span>
      </div>
    </div>

    <div class="buttons">
      <button class="btn btn-primary" id="drankBtn">
        <span>🐠</span> I drank water!
      </button>
      <button class="btn btn-secondary" id="remindBtn">
        <span>🫧</span> Remind me later
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
